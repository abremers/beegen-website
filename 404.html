<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Beegen</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/global.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;}
body{background:#00152E;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;position:relative;}

/* animated background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(2,195,154,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 70%, rgba(243,121,52,.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(2,195,154,.06) 0%, transparent 70%);
  animation:bgPulse 6s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:0;
}
@keyframes bgPulse{
  0%{opacity:.6;transform:scale(1);}
  50%{opacity:1;transform:scale(1.04);}
  100%{opacity:.6;transform:scale(.98);}
}

.wrap{position:relative;z-index:1;max-width:560px;width:100%;}

.logo-top{margin-bottom:48px;}
.logo-top img{height:36px;opacity:.9;}

.big-404{
  font-size:clamp(120px,20vw,200px);
  font-weight:800;
  color:#02C39A;
  line-height:1;
  letter-spacing:-4px;
  margin-bottom:8px;
  text-shadow:0 0 80px rgba(2,195,154,.35);
  animation:floatNum 4s ease-in-out infinite;
}
@keyframes floatNum{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

.error-title{font-size:clamp(22px,4vw,32px);font-weight:800;color:#fff;margin-bottom:16px;}
.error-msg{font-size:17px;color:rgba(255,255,255,.6);line-height:1.7;max-width:440px;margin:0 auto 40px;}

.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;border-radius:10px;padding:13px 26px;border:2px solid transparent;cursor:pointer;text-decoration:none;transition:all .22s;white-space:nowrap;}
.btn:hover{transform:translateY(-2px);}
.btn-primary{background:#F37934;color:#fff;border-color:#F37934;}
.btn-primary:hover{background:#d4621c;box-shadow:0 8px 32px rgba(243,121,52,.3);}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25);}
.btn-ghost:hover{background:rgba(255,255,255,.2);}

.divider-line{width:48px;height:3px;background:rgba(2,195,154,.4);border-radius:2px;margin:32px auto;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-top">
    <a href="index.html"><img src="assets/logos/beegen-logo-white.svg" alt="Beegen"></a>
  </div>

  <div class="big-404">404</div>

  <h1 class="error-title">Page Not Found</h1>
  <div class="divider-line"></div>
  <p class="error-msg">The page you're looking for has moved, been deleted, or never existed. Let's get you back on track.</p>

  <div class="actions">
    <a href="index.html" class="btn btn-primary">Go to Homepage</a>
    <a href="templates.html" class="btn btn-ghost">Browse Templates</a>
  </div>
</div>
</body>
</html>
